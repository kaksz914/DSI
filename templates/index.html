<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSI SUPREME COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #050508; --bg-panel: #0a0c14; --primary: #00ffcc;
            --secondary: #bc00ff; --danger: #ff0033; --warning: #ffcc00;
            --text: #e0e0e0; --border: rgba(0, 255, 204, 0.2); --sidebar-width: 250px;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: var(--text); font-family: 'Roboto Mono', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 100; }
        .sidebar-header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2em; color: var(--primary); margin: 0; text-shadow: 0 0 10px var(--primary); text-align: center; padding-bottom: 20px;}
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #888; transition: all 0.3s; border-left: 3px solid transparent; font-family: 'Orbitron', sans-serif; font-size: 0.8em; text-transform: uppercase; }
        .nav-item i { font-size: 1.2em; width: 20px; }
        .nav-item:hover, .nav-item.active { color: var(--primary); background: rgba(0,255,204,0.1); border-left-color: var(--primary); }
        .main-content { flex: 1; display: flex; flex-direction: column; background-image: radial-gradient(circle at center, #111 0%, #050508 100%); overflow-y: auto; padding: 30px; }
        .view-section { display: none; } .view-section.active { display: block; }
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 4px; padding: 25px; margin-bottom: 30px; }
        .panel-title { font-family: 'Orbitron', sans-serif; font-size: 1em; color: var(--secondary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .btn { background: rgba(0, 255, 204, 0.05); color: var(--primary); border: 1px solid var(--primary); padding: 10px 20px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.75em; text-transform: uppercase; }
        .btn:hover { background: var(--primary); color: #000; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--secondary); font-size: 0.7em; text-transform: uppercase; border-bottom: 2px solid #222; }
        td { padding: 15px; border-bottom: 1px solid #111; font-size: 0.9em; }
        .terminal { background: #000; border: 1px solid #222; height: 400px; overflow-y: auto; padding: 20px; font-family: 'Courier New', monospace; font-size: 0.85em; }
        .log-line { margin-bottom: 5px; }
        .log-type-cmd { color: var(--secondary); }
        .log-type-error { color: var(--danger); }
        .log-type-info { color: var(--primary); }
        #attackModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; }
        .modal-content { background: var(--bg-panel); border: 2px solid var(--primary); width: 500px; margin: 10% auto; padding: 40px; text-align: center; }
        .vendor-tag { background: #1a1a2e; padding: 3px 8px; border-radius: 4px; font-size: 0.7em; color: var(--secondary); border: 1px solid var(--secondary); }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><h1>DSI SUPREME C2</h1></div>
        <div class="nav-item active" onclick="switchView('connection')"><i class="fas fa-microchip"></i> Hardware</div>
        <div class="nav-item" onclick="switchView('radar')"><i class="fas fa-satellite-dish"></i> Radar Tático</div>
        <div class="nav-item" onclick="switchView('twin')"><i class="fas fa-users-slash"></i> Evil Twin</div>
        <div class="nav-item" onclick="switchView('logs')"><i class="fas fa-terminal"></i> Console C2</div>
        <div style="margin-top:auto; padding:20px;"><button class="btn btn-danger" style="width:100%" onclick="restaurarSistema()">HARD RESET</button></div>
    </nav>
    <main class="main-content">
        <section id="connection" class="view-section active">
            <div class="panel">
                <div class="panel-title"><i class="fas fa-plug"></i> Inventário de Hardware</div>
                <button class="btn" onclick="getInterfaces()"><i class="fas fa-sync"></i> Mapear Hardware</button>
                <table id="hardwareTable" style="margin-top:20px;">
                    <thead><tr><th>Interface</th><th>Estado</th><th>PHY</th><th>Suporte Evil Twin</th><th>Ação</th></tr></thead>
                    <tbody id="hardwareBody"></tbody>
                </table>
            </div>
            <div class="panel">
                <div class="panel-title"><i class="fas fa-wrench"></i> Manutenção</div>
                <button class="btn" style="border-color:var(--warning); color:var(--warning);" onclick="fixWifi6()">Driver Unifier</button>
                <button class="btn" style="border-color:var(--secondary); color:var(--secondary);" onclick="updateZeroDay()">Atualizar Arsenal</button>
            </div>
        </section>
        <section id="radar" class="view-section">
            <div class="panel">
                <div class="panel-title">Radar</div>
                <button class="btn" id="btnScan" onclick="startScan()">Iniciar Varredura</button>
                <button class="btn btn-danger" id="btnStopScan" onclick="stopScan()" style="display:none;">Parar</button>
                <table id="radarBody" style="margin-top:20px;"></table>
            </div>
        </section>
        <section id="twin" class="view-section">
            <div class="panel">
                <div class="panel-title">Evil Twin</div>
                <input type="text" id="twinSsid" placeholder="Nome da Rede Falsa" style="background:#000; border:1px solid var(--border); color:var(--primary); padding:10px;">
                <button class="btn" id="btnTwin" onclick="toggleTwin()">Ativar</button>
            </div>
        </section>
        <section id="logs" class="view-section">
            <div class="panel">
                <div class="panel-title">Console C2</div>
                <div class="terminal" id="consoleLog"></div>
            </div>
        </section>
    </main>
    <div id="attackModal"><div class="modal-content">
        <h3 id="modalTargetName" style="color:var(--primary);"></h3>
        <div id="targetAdvice" style="font-size:0.7em; color:var(--warning); margin-bottom:20px;"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="btn" onclick="launchAttack('autopilot')">MODO AUTOPILOTO</button>
            <button class="btn" onclick="launchAttack('vetorx')">Vetor X</button>
            <button class="btn" onclick="launchAttack('wps')">Vetor B: WPS Pixie-Dust</button>
            <button class="btn btn-danger" onclick="launchAttack('handshake')">Vetor C: Deauth Massivo</button>
            <button class="btn" style="margin-top:15px;" onclick="document.getElementById('attackModal').style.display='none'">Cancelar</button>
        </div>
    </div></div>
    <script>
        let lastLogIdx = 0, scanInterval = null, currentTarget = null;
        setInterval(fetchLogs, 1500);
        function switchView(id) {
            document.querySelectorAll('.view-section, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            Array.from(document.querySelectorAll('.nav-item')).find(i => i.getAttribute('onclick').includes(id)).classList.add('active');
        }
        async function fetchLogs() {
            try {
                const res = await fetch(`/api/logs?last=${lastLogIdx}`);
                const data = await res.json();
                if(data.status === 'success' && data.logs.length > 0) {
                    const consoleDiv = document.getElementById('consoleLog');
                    data.logs.forEach(log => {
                        const entry = document.createElement('div');
                        entry.className = `log-line log-type-${log.type}`;
                        entry.innerHTML = `<span style="color:#555;">[${log.time}]</span> ${log.cmd ? '[CMD] ' : ''}${log.msg}`;
                        consoleDiv.appendChild(entry);
                    });
                    lastLogIdx = data.next_idx; consoleDiv.scrollTop = consoleDiv.scrollHeight;
                }
            } catch(e) {}
        }
        async function getInterfaces() {
            const res = await fetch('/api/interfaces');
            const data = await res.json();
            if(data.status === 'success' && data.full_data) {
                const tbody = document.getElementById('hardwareBody');
                tbody.innerHTML = '';
                data.full_data.forEach(iface => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `<td>${iface.name}</td><td>${iface.type}</td><td>${iface.phy}</td><td>${iface.ap_support?'SIM':'NÃO'}</td><td><button class="btn" onclick="armInterface('${iface.name}')">USAR</button></td>`;
                    tbody.appendChild(tr);
                });
            }
        }
        async function armInterface(iface) {
            await fetch('/api/start_monitor', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ interface: iface }) });
            switchView('radar');
        }
        async function startScan() {
            document.getElementById('btnScan').style.display = 'none'; document.getElementById('btnStopScan').style.display = 'inline-block';
            await fetch('/api/start_scan', { method: 'POST' }); scanInterval = setInterval(fetchNetworks, 3000);
        }
        async function stopScan() {
            clearInterval(scanInterval); document.getElementById('btnScan').style.display = 'inline-block'; document.getElementById('btnStopScan').style.display = 'none'; await fetch('/api/stop_scan', { method: 'POST' });
        }
        async function fetchNetworks() {
            const res = await fetch('/api/get_networks'); const data = await res.json();
            if(data.status === 'success') {
                const tbody = document.getElementById('radarBody'); tbody.innerHTML = '';
                data.networks.forEach(net => {
                    let tr = document.createElement('tr');
                    tr.innerHTML = `<td>${net.signal}</td><td><span class="vendor-tag">${net.vendor}</span></td><td>${net.essid}</td><td>${net.bssid}</td><td>${net.channel}</td><td><button class="btn" onclick="openAttackModal('${net.bssid}', '${net.essid}', '${net.channel}')">MIRAR</button></td>`;
                    tbody.appendChild(tr);
                });
            }
        }
        function openAttackModal(bssid, essid, channel) {
            currentTarget = {bssid, essid, channel}; document.getElementById('modalTargetName').innerText = essid;
            const row = Array.from(document.querySelectorAll('#radarBody tr')).find(r => r.innerText.includes(bssid));
            const vendor = row ? row.querySelector('.vendor-tag').innerText : "";
            document.getElementById('targetAdvice').innerText = (vendor.includes("Starlink")) ? "ALVO STARLINK. USE AUTOPILOTO OU VETOR X." : "";
            document.getElementById('attackModal').style.display = 'block';
        }
        async function launchAttack(type) { document.getElementById('attackModal').style.display = 'none'; switchView('logs'); await fetch('/api/attack', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...currentTarget, attack_type: type}) }); }
        async function toggleTwin() { const ssid = document.getElementById('twinSsid').value; await fetch(`/api/twin/start`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ ssid: ssid }) }); }
        async function fixWifi6() { await fetch('/api/fix/wifi6', { method: 'POST' }); switchView('logs'); }
        async function updateZeroDay() { await fetch('/api/update', { method: 'POST' }); switchView('logs'); }
        async function stopAutopilot() { await fetch('/api/autopilot/stop', { method: 'POST' }); }
        async function restaurarSistema() { await fetch('/api/restore', { method: 'POST' }); location.reload(); }
    </script>
</body>
</html>
